<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoomlike — Screen Sharing</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Zoomlike</h1>
    <p class="subtitle">P2P Screen Sharing</p>

    <!-- 비밀번호 입력 -->
    <div id="login-screen">
      <div class="login-form">
        <input type="password" id="input-password" placeholder="비밀번호 입력" />
        <button id="btn-login" class="primary-btn">입장</button>
      </div>
      <div id="login-error" class="login-error hidden">비밀번호가 틀렸습니다</div>
    </div>

    <!-- 역할 선택 -->
    <div id="role-select" class="hidden">
      <button id="btn-sharer" class="role-btn">화면 공유하기</button>
      <button id="btn-viewer" class="role-btn">화면 보기</button>
    </div>

    <!-- 공유자 화면 -->
    <div id="sharer-panel" class="panel hidden">
      <div class="status" id="sharer-status">준비 중...</div>
      <div id="peer-id-display" class="peer-id-box hidden">
        <label>공유 코드:</label>
        <span id="peer-id-text"></span>
        <button id="btn-copy" class="small-btn">복사</button>
      </div>
      <div id="share-url-display" class="share-url-box hidden">
        <label>공유 링크:</label>
        <input type="text" id="share-url-text" readonly />
        <button id="btn-copy-url" class="small-btn">URL 복사</button>
      </div>
      <div class="controls">
        <button id="btn-start-share" class="primary-btn">공유 시작</button>
        <button id="btn-stop-share" class="danger-btn hidden">공유 중지</button>
      </div>
      <video id="local-video" autoplay muted playsinline></video>
      <button id="btn-sharer-chat-toggle" class="small-btn hidden">💬 채팅</button>
      <button id="btn-back-sharer" class="back-btn">← 돌아가기</button>
    </div>

    <!-- 뷰어 화면 -->
    <div id="viewer-panel" class="panel hidden">
      <div class="status" id="viewer-status">연결 대기 중...</div>
      <div class="join-form">
        <input type="text" id="input-peer-id" placeholder="공유 코드 입력" />
        <button id="btn-connect" class="primary-btn">연결</button>
      </div>
      <div class="video-wrapper">
        <video id="remote-video" autoplay playsinline></video>
        <button id="btn-fullscreen" class="fullscreen-btn" title="전체화면">⛶</button>
      </div>
      <button id="btn-viewer-chat-toggle" class="small-btn hidden">💬 채팅</button>
      <button id="btn-back-viewer" class="back-btn">← 돌아가기</button>
    </div>
  </div>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
